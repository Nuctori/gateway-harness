name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ">=1.22"

      - run: go test ./...

      - run: go run ./cmd/gateway-harness validate examples/newapi/context-harness.policy.json

      - run: go run ./cmd/gateway-harness validate-adapter examples/newapi/adapter.capability.json
