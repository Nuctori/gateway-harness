name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ">=1.22"

      - run: go test ./...

      - run: sh -n examples/newapi/online-acceptance.sh

      - run: sh -n examples/newapi/online-acceptance.test.sh

      - run: sh examples/newapi/online-acceptance.test.sh

      - run: go build -o dist/gateway-harness ./cmd/gateway-harness

      - run: ./dist/gateway-harness validate examples/newapi/context-harness.policy.json

      - run: ./dist/gateway-harness dry-run-policy examples/newapi/context-harness.policy.json request.before_upstream fixtures/newapi/policy-dry-run.request.json

      - run: ./dist/gateway-harness dry-run-policy examples/newapi/context-harness.policy.json responses.compact.before_upstream fixtures/newapi/policy-dry-run.request.json

      - run: ./dist/gateway-harness dry-run-policy examples/newapi/context-harness.policy.json context.continuity_drop.detected fixtures/newapi/policy-dry-run.request.json

      - run: ./dist/gateway-harness validate-adapter examples/newapi/adapter.capability.json

      - run: ./dist/gateway-harness validate-conformance fixtures/newapi/responses-tool-chain.conformance.json

      - run: ./dist/gateway-harness replay-conformance fixtures/newapi/responses-tool-chain.conformance.json

      - run: ./dist/gateway-harness validate-conformance fixtures/newapi/responses-policy-apply.conformance.json

      - run: ./dist/gateway-harness replay-policy-conformance fixtures/newapi/responses-policy-apply.conformance.json responses.before_upstream

      - run: ./dist/gateway-harness validate-conformance fixtures/newapi/responses-compact-ledger-sentinel.conformance.json

      - run: ./dist/gateway-harness replay-policy-conformance fixtures/newapi/responses-compact-ledger-sentinel.conformance.json responses.compact.before_upstream

      - run: ./dist/gateway-harness conformance-schema > /tmp/gateway-harness.conformance.schema.json

      - run: ./dist/gateway-harness validate-ledger fixtures/newapi/project-session.ledger.json

      - run: ./dist/gateway-harness explain-ledger fixtures/newapi/project-session.ledger.json

      - run: ./dist/gateway-harness query-ledger fixtures/newapi/project-session.ledger.json -tag adapter:newapi -tag domain:coding -event-type compact

      - run: ./dist/gateway-harness ledger-schema > /tmp/gateway-harness.ledger.schema.json

      - run: ./dist/gateway-harness validate-steward fixtures/newapi/compact-context.steward.json

      - run: ./dist/gateway-harness explain-steward fixtures/newapi/compact-context.steward.json

      - run: ./dist/gateway-harness steward-schema > /tmp/gateway-harness.steward.schema.json

      - run: ./dist/gateway-harness validate-steward-proposal fixtures/newapi/compact-context.steward.json fixtures/newapi/compact-context.steward-proposal.json

      - run: ./dist/gateway-harness explain-steward-proposal fixtures/newapi/compact-context.steward.json fixtures/newapi/compact-context.steward-proposal.json

      - run: ./dist/gateway-harness steward-proposal-schema > /tmp/gateway-harness.steward-proposal.schema.json

      - run: ./dist/gateway-harness dry-run-steward-proposal fixtures/newapi/compact-context.steward.json fixtures/newapi/compact-context.steward-proposal.json fixtures/newapi/compact-context.request.json
