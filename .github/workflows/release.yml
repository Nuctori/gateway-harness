name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            suffix: linux-armv7
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ">=1.22"

      - name: Test
        run: go test ./...

      - name: Build CLI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -ldflags "-s -w" -o "dist/gateway-harness-${{ matrix.suffix }}" ./cmd/gateway-harness
          go build -ldflags "-s -w" -o "dist/goal-gate-host-http-${{ matrix.suffix }}" ./examples/goal-gate-host-http
          go build -ldflags "-s -w" -o "dist/goalreviewhelper-${{ matrix.suffix }}" ./cmd/gateway-harness/testdata/goalreviewhelper

      - uses: actions/upload-artifact@v4
        with:
          name: gateway-harness-${{ matrix.suffix }}
          path: dist/gateway-harness-${{ matrix.suffix }}
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: goal-gate-host-http-${{ matrix.suffix }}
          path: dist/goal-gate-host-http-${{ matrix.suffix }}
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: goalreviewhelper-${{ matrix.suffix }}
          path: dist/goalreviewhelper-${{ matrix.suffix }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Add schema and checksums
        run: |
          cp schema/gateway-harness.*.schema.json dist/
          tar -czf dist/gateway-harness-examples.tar.gz \
            examples \
            fixtures \
            docs \
            README.md \
            README.zh-CN.md \
            RELEASE.md \
            LICENSE
          for suffix in linux-amd64 linux-arm64; do
            stack_dir="dist/demo-stack-${suffix}"
            mkdir -p "${stack_dir}/examples" "${stack_dir}/fixtures"
            cp "dist/gateway-harness-${suffix}" "${stack_dir}/gateway-harness"
            cp "dist/goal-gate-host-http-${suffix}" "${stack_dir}/goal-gate-host-http"
            cp "dist/goalreviewhelper-${suffix}" "${stack_dir}/goalreviewhelper"
            cp -R demo-stack "${stack_dir}/"
            cp examples/goal-gate-host/ui-demo.html "${stack_dir}/demo-stack/ui-demo.html"
            cp examples/goal-gate-host/goal-gate-host.bundle.example.json "${stack_dir}/demo-stack/goal-gate-host.bundle.example.json"
            cp -R examples/goal-gate-host "${stack_dir}/examples/"
            cp -R examples/smolagents "${stack_dir}/examples/"
            cp -R examples/newapi "${stack_dir}/examples/"
            cp -R fixtures/goal-gate "${stack_dir}/fixtures/"
            cp README.md README.zh-CN.md RELEASE.md LICENSE "${stack_dir}/"
            tar -C "${stack_dir}" -czf "dist/gateway-harness-demo-stack-${suffix}.tar.gz" .
            rm -rf "${stack_dir}"
          done
          cd dist
          sha256sum * > checksums.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "${GITHUB_REF_NAME}" \
            --notes "Gateway Harness ${GITHUB_REF_NAME}"
